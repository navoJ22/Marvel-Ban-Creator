<!DOCTYPE html>

<head>

<title>Ban / Save Creator</title>
<style>
body {
  background: #111;

}
canvas {
  border: 1px solid #555;
  margin-top: 10px;
  cursor: grab;
}

  display: flex;
  justify-content: center;
  gap: 20px;

<body>

  <canvas id="canvasSave" width="500" height="500"></canvas>
